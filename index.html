<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shwTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top date bar -->
  <div id="date-bar">
    <span id="current-date"></span>
    <span id="week-range"></span>
  </div>

  <!-- Tab bar -->
  <div id="tab-bar">
    <button class="tab active" data-tab="tracker">Tracker</button>
    <button class="tab" data-tab="income">Weekly Income</button>
  </div>

  <!-- ==================== TRACKER VIEW ==================== -->
  <div id="tracker-view" class="view active">
    <div id="app">
      <!-- Combined Dailies + Bosses Panel -->
      <div class="panel" id="tracker-panel">
        <div class="panel-body tracker-scroll">
          <table id="tracker-table">
            <thead>
              <tr id="tracker-section-row">
                <!-- Section labels (Dailies + toggle, Bosses) built by JS -->
              </tr>
              <tr id="tracker-header-row">
                <!-- Emoji column headers built by JS -->
              </tr>
            </thead>
            <tbody id="tracker-body">
              <!-- Character rows built by JS -->
            </tbody>
          </table>
          <div class="add-char-row">
            <button class="btn-add-char" id="add-character" title="Add character">+</button>
          </div>
        </div>
      </div>

      <!-- Memos Panel -->
      <div class="panel" id="memos-panel">
        <div class="panel-header">
          <span class="panel-title memo-title">Memos</span>
          <div class="panel-actions">
            <button class="btn-icon" id="add-memo" title="Add memo">+</button>
          </div>
        </div>
        <div class="panel-body memos-body" id="memos-list"></div>
      </div>
    </div>
  </div>

  <!-- ==================== INCOME VIEW ==================== -->
  <div id="income-view" class="view">
    <div id="income-container">
      <div class="panel" id="income-panel">
        <div class="panel-header">
          <span class="panel-title income-title">Weekly Boss Income</span>
          <div class="panel-actions">
            <button class="btn-icon" id="manage-bosses" title="Manage Bosses">&#9881;</button>
          </div>
        </div>
        <div class="panel-body income-body">
          <div class="income-table-wrap">
            <table id="income-table">
              <thead id="income-thead"></thead>
              <tbody id="income-tbody"></tbody>
              <tfoot id="income-tfoot"></tfoot>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== MODALS ==================== -->

  <!-- Character picker modal (for adding rows) -->
  <div id="char-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <span>Select Character Image</span>
        <button class="btn-icon modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="char-grid"></div>
    </div>
  </div>

  <!-- Character tag modal (for memos - multi-select) -->
  <div id="memo-char-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <span>Tag Characters</span>
        <button class="btn-icon modal-close" id="memo-modal-close">&times;</button>
      </div>
      <div class="modal-body" id="memo-char-grid"></div>
      <div class="modal-footer">
        <button class="btn-done" id="memo-char-done">Done</button>
      </div>
    </div>
  </div>

  <!-- Tracker Settings modal -->
  <div id="tracker-settings-modal" class="modal hidden">
    <div class="modal-content ts-modal-content">
      <div class="modal-header">
        <span>Tracker Settings</span>
        <button class="btn-icon modal-close" id="tracker-settings-close">&times;</button>
      </div>
      <div class="modal-body ts-modal-body" id="tracker-settings-modal-body"></div>
      <div class="modal-footer ts-modal-footer">
        <button class="btn-secondary" id="tracker-settings-add-boss">+ Add Boss</button>
        <button class="btn-done" id="tracker-settings-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Boss Manager modal -->
  <div id="boss-modal" class="modal hidden">
    <div class="modal-content boss-modal-content">
      <div class="modal-header">
        <span>Manage Bosses</span>
        <button class="btn-icon modal-close" id="boss-modal-close">&times;</button>
      </div>
      <div class="modal-body boss-modal-body" id="boss-modal-list"></div>
      <div class="modal-footer boss-modal-footer">
        <button class="btn-secondary" id="boss-add-new">+ Add Boss</button>
        <div class="boss-footer-right">
          <button class="btn-secondary" id="boss-reset-defaults">Reset Defaults</button>
          <button class="btn-done" id="boss-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
